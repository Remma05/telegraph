<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Telegraph</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --bg-panel: #1a1a1a;
      --bg-input: #242424;
      --bg-hover: #2a2a2a;
      --bg-msg-self: #2b5278;
      --bg-msg-other: #242424;
      --border: #2e2e2e;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #4a9eff;
      --accent-hover: #5aaeff;
      --danger: #e05555;
      --online: #3ec06a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* AUTH */
    #auth-screen { width: 360px; max-width: calc(100vw - 32px); }

    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo h1 { font-size: 28px; font-weight: 600; color: var(--accent); letter-spacing: -0.5px; }
    .auth-logo p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    .auth-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
    }

    .tab-row {
      display: flex; gap: 4px; margin-bottom: 1.5rem;
      background: var(--bg-input); border-radius: 8px; padding: 4px;
    }

    .tab-btn {
      flex: 1; padding: 8px; border: none; border-radius: 6px;
      font-size: 14px; cursor: pointer; background: transparent;
      color: var(--text-muted); transition: all 0.15s;
    }
    .tab-btn.active { background: var(--bg-panel); color: var(--text); }

    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-size: 12px; color: var(--text-muted);
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input {
      width: 100%; padding: 12px 14px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 16px; outline: none; transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%; padding: 13px; background: var(--accent); border: none;
      border-radius: 8px; color: #fff; font-size: 16px; font-weight: 500;
      cursor: pointer; margin-top: 0.5rem; transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    .error-msg {
      font-size: 13px; color: var(--danger);
      margin-top: 0.75rem; text-align: center; min-height: 18px;
    }

    /* APP */
    #app-screen { display: none; width: 100vw; height: 100dvh; }

    .layout { display: flex; height: 100dvh; position: relative; }

    /* SIDEBAR */
    .sidebar {
      width: 280px; min-width: 280px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      transition: transform 0.25s ease;
      z-index: 10;
    }

    .sidebar-header {
      padding: 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-header span { font-size: 18px; font-weight: 600; color: var(--accent); }

    .ws-indicator {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted); transition: background 0.3s;
      display: inline-block; margin-right: 4px;
    }
    .ws-indicator.connected { background: var(--online); }

    .logout-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 13px; padding: 4px 8px;
      border-radius: 6px; transition: all 0.15s;
    }
    .logout-btn:hover { background: var(--bg-hover); color: var(--text); }

    .chat-list { flex: 1; overflow-y: auto; padding: 8px; }
    .chat-list::-webkit-scrollbar { width: 4px; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .chat-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; border-radius: 8px;
      cursor: pointer; transition: background 0.12s;
    }
    .chat-item:hover { background: var(--bg-hover); }
    .chat-item.active { background: var(--bg-msg-self); }

    .avatar {
      width: 42px; height: 42px; min-width: 42px;
      border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 600; color: #fff;
    }

    .chat-item-info { overflow: hidden; }
    .chat-item-name {
      font-size: 15px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-item-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .unread-badge {
      margin-left: auto; min-width: 20px; height: 20px;
      background: var(--accent); border-radius: 10px;
      font-size: 11px; font-weight: 600; color: #fff;
      display: flex; align-items: center; justify-content: center;
      padding: 0 6px;
    }

    .empty-chats {
      text-align: center; padding: 2rem 1rem;
      color: var(--text-muted); font-size: 13px; line-height: 1.6;
    }

    /* CHAT AREA */
    .chat-area {
      flex: 1; display: flex; flex-direction: column;
      background: var(--bg); overflow: hidden;
    }

    .chat-header {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      background: var(--bg-panel); display: flex; align-items: center; gap: 12px;
    }
    .chat-header-name { font-size: 16px; font-weight: 600; }

    /* back button — only mobile */
    .back-btn {
      display: none;
      background: none; border: none; color: var(--accent);
      cursor: pointer; padding: 4px 8px 4px 0; font-size: 22px; line-height: 1;
    }

    .placeholder-screen {
      flex: 1; display: flex; align-items: center;
      justify-content: center; color: var(--text-muted); font-size: 14px;
    }

    .messages-container {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .messages-container::-webkit-scrollbar { width: 4px; }
    .messages-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message { display: flex; flex-direction: column; max-width: 75%; }
    .message.self { align-self: flex-end; align-items: flex-end; }
    .message.other { align-self: flex-start; align-items: flex-start; }

    .msg-bubble {
      padding: 8px 14px; border-radius: 16px;
      font-size: 15px; line-height: 1.5; word-break: break-word;
    }
    .message.self .msg-bubble { background: var(--bg-msg-self); border-bottom-right-radius: 4px; }
    .message.other .msg-bubble { background: var(--bg-msg-other); border-bottom-left-radius: 4px; }

    .msg-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; padding: 0 4px; }
    .msg-sender { font-size: 12px; color: var(--accent); margin-bottom: 3px; padding: 0 4px; }

    .msg-new { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .input-area {
      padding: 10px 14px; border-top: 1px solid var(--border);
      background: var(--bg-panel); display: flex; gap: 10px; align-items: flex-end;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }

    .msg-input {
      flex: 1; padding: 10px 14px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 20px;
      color: var(--text); font-size: 16px; outline: none;
      resize: none; max-height: 120px; line-height: 1.4;
      font-family: inherit; transition: border-color 0.15s;
    }
    .msg-input:focus { border-color: var(--accent); }

    .send-btn {
      width: 42px; height: 42px; min-width: 42px;
      background: var(--accent); border: none; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn svg { width: 18px; height: 18px; fill: #fff; transform: translateX(1px); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center; z-index: 100;
      padding: 16px;
    }
    .modal {
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 320px;
    }
    .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
    .modal-actions { display: flex; gap: 8px; margin-top: 1rem; }

    .btn-cancel {
      flex: 1; padding: 11px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 15px; cursor: pointer;
    }
    .btn-cancel:hover { background: var(--bg-hover); }

    .btn-confirm {
      flex: 1; padding: 11px; background: var(--accent);
      border: none; border-radius: 8px; color: #fff;
      font-size: 15px; cursor: pointer;
    }
    .btn-confirm:hover { background: var(--accent-hover); }

    .new-chat-btn {
      margin: 8px; padding: 11px; background: none;
      border: 1px dashed var(--border); border-radius: 8px;
      color: var(--text-muted); font-size: 14px; cursor: pointer;
      width: calc(100% - 16px); transition: all 0.15s;
    }
    .new-chat-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .sidebar {
        position: absolute; top: 0; left: 0; bottom: 0;
        width: 100vw; min-width: unset;
        transform: translateX(0);
      }

      .sidebar.hidden {
        transform: translateX(-100%);
      }

      .chat-area {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        transform: translateX(100%);
        transition: transform 0.25s ease;
      }

      .chat-area.visible {
        transform: translateX(0);
      }

      .back-btn { display: block; }

      .message { max-width: 85%; }
    }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">
    <h1>Telegraph</h1>
    <p>Simple messaging</p>
  </div>
  <div class="auth-card">
    <div class="tab-row">
      <button class="tab-btn active" onclick="showTab('login')">Login</button>
      <button class="tab-btn" onclick="showTab('register')">Register</button>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="auth-username" placeholder="Enter username" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="auth-password" placeholder="Enter password" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') authSubmit()" />
    </div>
    <button class="btn-primary" onclick="authSubmit()" id="auth-submit-btn">Login</button>
    <div class="error-msg" id="auth-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="layout">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span>
          <span class="ws-indicator" id="ws-indicator"></span>
          Telegraph
        </span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
      <button class="new-chat-btn" onclick="openNewChat()">+ New chat</button>
      <div class="chat-list" id="chat-list"></div>
    </div>

    <div class="chat-area" id="chat-area">
      <div class="placeholder-screen" id="placeholder">
        Select a chat to start messaging
      </div>
      <div id="active-chat" style="display:none; flex:1; flex-direction:column; overflow:hidden; min-height:0;">
        <div class="chat-header">
          <button class="back-btn" onclick="goBack()">‹</button>
          <div class="avatar" id="chat-avatar"></div>
          <div class="chat-header-name" id="chat-header-name"></div>
        </div>
        <div class="messages-container" id="messages"></div>
        <div class="input-area">
          <textarea class="msg-input" id="msg-input" rows="1" placeholder="Write a message..."
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
          <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="new-chat-modal" style="display:none">
  <div class="modal">
    <h3>New chat</h3>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="new-chat-username" placeholder="Enter username to chat with" />
    </div>
    <div class="error-msg" id="new-chat-error"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeNewChat()">Cancel</button>
      <button class="btn-confirm" onclick="startNewChat()">Start chat</button>
    </div>
  </div>
</div>

<script>
  const API = 'https://telegraph-production-3407.up.railway.app';
  let accessToken = localStorage.getItem('access_token') || null;
  let refreshToken = localStorage.getItem('refresh_token') || null;
  let currentUsername = localStorage.getItem('username') || null;
  let activeChat = null;
  let currentTab = 'login';
  let stompClient = null;
  let unreadCounts = {};

  const isMobile = () => window.innerWidth <= 600;

  function goBack() {
    document.getElementById('sidebar').classList.remove('hidden');
    document.getElementById('chat-area').classList.remove('visible');
  }

  function showChatArea() {
    if (isMobile()) {
      document.getElementById('sidebar').classList.add('hidden');
      document.getElementById('chat-area').classList.add('visible');
    }
  }

  // ─── AUTH ────────────────────────────────────────────────────────────────────

  function showTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('auth-submit-btn').textContent = tab === 'login' ? 'Login' : 'Register';
    document.getElementById('auth-error').textContent = '';
  }

  async function request(path, options = {}, retry = true) {
    const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
    if (accessToken) headers['Authorization'] = 'Bearer ' + accessToken;
    const res = await fetch(API + path, { ...options, headers });
    if ((res.status === 401 || res.status === 403) && retry) {
      const ok = await tryRefresh();
      if (ok) return request(path, options, false);
      showAuth();
      return null;
    }
    return res;
  }

  async function tryRefresh() {
    if (!refreshToken) return false;
    try {
      const res = await fetch(API + '/api/auth/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refreshToken })
      });
      if (!res.ok) return false;
      const data = await res.json();
      accessToken = data.accessToken;
      refreshToken = data.refreshToken;
      localStorage.setItem('access_token', accessToken);
      localStorage.setItem('refresh_token', refreshToken);
      return true;
    } catch { return false; }
  }

  async function authSubmit() {
    const username = document.getElementById('auth-username').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl = document.getElementById('auth-error');
    errEl.textContent = '';

    if (!username || !password) { errEl.textContent = 'Fill in all fields'; return; }

    if (currentTab === 'register') {
      const res = await fetch(API + '/users/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      if (!res.ok) { errEl.textContent = 'Registration failed'; return; }
    }

    const res = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (!res.ok) { errEl.textContent = 'Invalid username or password'; return; }

    const data = await res.json();
    accessToken = data.accessToken;
    refreshToken = data.refreshToken;
    localStorage.setItem('access_token', accessToken);
    localStorage.setItem('refresh_token', refreshToken);
    localStorage.setItem('username', username);
    currentUsername = username;
    showApp();
  }

  async function logout() {
    disconnectWs();
    await request('/api/auth/logout', { method: 'POST' });
    accessToken = null; refreshToken = null; currentUsername = null;
    localStorage.clear();
    showAuth();
  }

  function showAuth() {
    document.getElementById('auth-screen').style.display = 'block';
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('auth-password').value = '';
    document.getElementById('auth-error').textContent = '';
  }

  async function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    await loadChats();
    connectWs();
  }

  function updateReadMarks() {
    document.querySelectorAll('.msg-meta').forEach(el => {
      if (el.textContent.includes('✓') && !el.textContent.includes('✓✓')) {
        el.textContent = el.textContent.replace('✓', '✓✓');
      }
    });
  }

  // ─── WEBSOCKET ────────────────────────────────────────────────────────────────

  function connectWs() {
    if (stompClient && stompClient.connected) return;
    const socket = new WebSocket(`wss://telegraph-production-3407.up.railway.app/ws?token=${accessToken}`);
    stompClient = Stomp.over(socket);
    stompClient.debug = null;
    stompClient.connect({}, () => {
      document.getElementById('ws-indicator').classList.add('connected');
      stompClient.subscribe('/user/queue/messages', (frame) => {
        const msg = JSON.parse(frame.body);
        handleIncomingMessage(msg);
      });
      stompClient.subscribe('/user/queue/read', (frame) => {
        const readerId = JSON.parse(frame.body);
        if (activeChat && activeChat.userId === readerId) updateReadMarks();
      });
    }, () => {
      document.getElementById('ws-indicator').classList.remove('connected');
      setTimeout(connectWs, 3000);
    });
  }

  function disconnectWs() {
    if (stompClient) { stompClient.disconnect(); stompClient = null; }
    document.getElementById('ws-indicator').classList.remove('connected');
  }

  function handleIncomingMessage(msg) {
    if (activeChat) {
      const isFromCompanion = msg.senderName === activeChat.username;
      if (isFromCompanion) { appendMessage(msg); loadMessages(); return; }
    }
    loadChats();
  }

  // ─── CHATS ───────────────────────────────────────────────────────────────────

  async function loadChats() {
    const res = await request('/chats');
    if (!res || !res.ok) return;
    const chats = await res.json();
    renderChats(chats);
  }

  function renderChats(chats) {
    const list = document.getElementById('chat-list');
    if (!chats.length) {
      list.innerHTML = '<div class="empty-chats">No chats yet.<br>Start a new one!</div>';
      return;
    }
    list.innerHTML = chats.map(c => {
      const unread = unreadCounts[c.userId] || 0;
      return `
        <div class="chat-item ${activeChat && activeChat.userId === c.userId ? 'active' : ''}"
             id="chat-item-${c.userId}"
             onclick="openChat(${c.userId}, '${escapeHtml(c.username)}')">
          <div class="avatar">${c.username[0].toUpperCase()}</div>
          <div class="chat-item-info">
            <div class="chat-item-name">${escapeHtml(c.username)}</div>
            <div class="chat-item-sub">Click to open</div>
          </div>
          ${unread > 0
            ? `<div class="unread-badge" id="badge-${c.userId}">${unread}</div>`
            : `<div id="badge-${c.userId}" style="display:none" class="unread-badge"></div>`}
        </div>
      `;
    }).join('');
  }

  function updateUnreadBadge(userId) {
    const badge = document.getElementById(`badge-${userId}`);
    if (!badge) { loadChats(); return; }
    const count = unreadCounts[userId] || 0;
    if (count > 0) { badge.textContent = count; badge.style.display = 'flex'; }
    else { badge.style.display = 'none'; }
  }

  // ─── MESSAGES ────────────────────────────────────────────────────────────────

  async function openChat(userId, username) {
    activeChat = { userId, username };
    unreadCounts[userId] = 0;
    updateUnreadBadge(userId);

    document.getElementById('placeholder').style.display = 'none';
    const ac = document.getElementById('active-chat');
    ac.style.display = 'flex';
    ac.style.flexDirection = 'column';
    ac.style.flex = '1';

    document.getElementById('chat-avatar').textContent = username[0].toUpperCase();
    document.getElementById('chat-header-name').textContent = username;

    document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
    const item = document.getElementById(`chat-item-${userId}`);
    if (item) item.classList.add('active');

    showChatArea();
    await loadMessages();
    await loadChats();
  }

  async function loadMessages() {
    if (!activeChat) return;
    const res = await request(`/a/${activeChat.userId}`);
    if (!res || !res.ok) return;
    const msgs = await res.json();
    renderMessages(msgs);
  }

  function renderMessages(msgs) {
    const container = document.getElementById('messages');
    const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;
    container.innerHTML = msgs.map(m => buildMessageHtml(m, false)).join('');
    if (wasAtBottom) container.scrollTop = container.scrollHeight;
  }

  function appendMessage(msg) {
    const container = document.getElementById('messages');
    const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;
    const div = document.createElement('div');
    div.innerHTML = buildMessageHtml(msg, true);
    container.appendChild(div.firstElementChild);
    if (wasAtBottom) container.scrollTop = container.scrollHeight;
  }

  function buildMessageHtml(m, isNew) {
    const isSelf = m.senderName === currentUsername;
    const time = new Date(m.sentAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const readMark = isSelf ? (m.readAt ? ' ✓✓' : ' ✓') : '';
    return `
      <div class="message ${isSelf ? 'self' : 'other'} ${isNew ? 'msg-new' : ''}">
        ${!isSelf ? `<div class="msg-sender">${escapeHtml(m.senderName)}</div>` : ''}
        <div class="msg-bubble">${escapeHtml(m.text)}</div>
        <div class="msg-meta">${time}${readMark}</div>
      </div>
    `;
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !activeChat) return;
    input.value = '';
    input.style.height = 'auto';

    const res = await request(`/a/${activeChat.userId}`, {
      method: 'POST',
      body: JSON.stringify({ text, receiverId: activeChat.userId })
    });
    if (res && res.ok) {
      const msg = await res.json();
      appendMessage(msg);
    }
  }

  // ─── MODAL ───────────────────────────────────────────────────────────────────

  function openNewChat() {
    document.getElementById('new-chat-modal').style.display = 'flex';
    document.getElementById('new-chat-username').value = '';
    document.getElementById('new-chat-error').textContent = '';
    setTimeout(() => document.getElementById('new-chat-username').focus(), 50);
  }

  function closeNewChat() {
    document.getElementById('new-chat-modal').style.display = 'none';
  }

  async function startNewChat() {
    const username = document.getElementById('new-chat-username').value.trim();
    const errEl = document.getElementById('new-chat-error');
    if (!username) { errEl.textContent = 'Enter a username'; return; }
    if (username === currentUsername) { errEl.textContent = "Can't chat with yourself"; return; }

    const res = await request(`/users/by-username/${username}`);
    if (!res || !res.ok) { errEl.textContent = 'User not found'; return; }
    const user = await res.json();

    closeNewChat();
    await openChat(user.id, user.username);
    await loadChats();
  }

  // ─── UTILS ───────────────────────────────────────────────────────────────────

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── INIT ────────────────────────────────────────────────────────────────────

  if (accessToken) showApp();
</script>
</body>
</html>
